<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>
        {% block title %}Sistema de Cadastro de Clientes{% endblock %}
    </title>
</head>

<body>
    {% block body %}
    <h1>Usuário</h1>
    {% endblock %}
    <div class="container">
        <h1>Bem-vindo ao Sistema de Cadastro de Clientes</h1>
        <p>Gerencie cadastros de forma simples e rápida.</p>
        <div class="actions">
            <a class="btn-link" href="{{url_for('cadastro')}}">Ir para cadastro</a>
            <a href="{{ url_for('sobre') }}">Sobre Nós</a>
        </div>
    </div>
    
    <div id="footer">
        <p>&copy; 2024 Sistema de Cadastro de Clientes. Todos os direitos reservados.</p>
        
    </div>

</body>

</html>
